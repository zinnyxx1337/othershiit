  .page{min-height:100vh;position:relative;overflow:hidden;background:#f0ede8;font-family:'Inter',sans-serif}

  .overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(240,237,232,0.25) 0%,rgba(240,237,232,0.55) 55%,rgba(240,237,232,0.92) 100%)}
  .content{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;padding:50px 20px 40px}

  .username{color:#111;font-size:20px;font-weight:700;letter-spacing:0.4px;margin-bottom:4px;text-shadow:0 1px 8px rgba(255,255,255,0.8)}
  .handle{color:rgba(0,0,0,0.4);font-size:13px;margin-bottom:16px}
  .badges{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-bottom:16px}
  .badge{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500;backdrop-filter:blur(4px)}
  .badge-purple{background:rgba(255,255,255,0.55);color:#5a52c4;border:1px solid rgba(127,119,221,0.35)}
  .badge-pink{background:rgba(255,255,255,0.55);color:#b83868;border:1px solid rgba(212,83,126,0.35)}
  .badge-amber{background:rgba(255,255,255,0.55);color:#9a6210;border:1px solid rgba(186,117,23,0.35)}
  .bio-text{color:rgba(0,0,0,0.65);font-size:13.5px;line-height:1.75;text-align:center;max-width:300px;margin-bottom:24px;text-shadow:0 1px 6px rgba(255,255,255,0.6)}

  .link-btn:hover{background:rgba(255,255,255,0.85);box-shadow:0 4px 20px rgba(0,0,0,0.12)}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#111;color:#fff;font-size:13px;padding:9px 18px;border-radius:10px;opacity:0;transition:opacity 0.2s,transform 0.2s;pointer-events:none;z-index:999;font-family:'Inter',sans-serif}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .status{display:flex;align-items:center;gap:6px;color:rgba(0,0,0,0.4);font-size:12px;margin-bottom:18px}
  .dot{width:7px;height:7px;border-radius:50%;background:#22c55e;box-shadow:0 0 6px #22c55e}
  .divider{width:40px;height:1px;background:rgba(0,0,0,0.1);margin:18px auto}
  .footer{color:rgba(0,0,0,0.25);font-size:11px}
  .icon-wrap{display:flex;align-items:center;justify-content:center;transition:transform 0.1s ease-out}

<script>
  function copyDiscord() {
    navigator.clipboard.writeText('4elov3k_rr').catch(function(){
      var t = document.createElement('textarea');
      t.value = '4elov3k_rr';
      document.body.appendChild(t); t.select();
      document.execCommand('copy');
      document.body.removeChild(t);
    });
    var toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(function(){ toast.classList.remove('show'); }, 2000);
  }

  var buttons = [
    { btn: document.getElementById('btn-discord'), icon: document.getElementById('icon-discord') },
    { btn: document.getElementById('btn-github'),  icon: document.getElementById('icon-github') }
  ];

  buttons.forEach(function(item) {
    item.btn.addEventListener('mousemove', function(e) {
      var rect = item.btn.getBoundingClientRect();
      var cx = rect.left + rect.width / 2;
      var cy = rect.top + rect.height / 2;
      var dx = (e.clientX - cx) / (rect.width / 2);
      var dy = (e.clientY - cy) / (rect.height / 2);
      item.btn.style.transform = 'perspective(600px) rotateX('+(dy*6)+'deg) rotateY('+(-dx*6)+'deg) scale(1.02)';
      item.icon.style.transform = 'translate('+(dx*5)+'px,'+(dy*5)+'px) rotate('+(dx*12)+'deg)';
    });
    item.btn.addEventListener('mouseleave', function() {
      item.btn.style.transform = '';
      item.icon.style.transform = '';
    });
  });
</script>
